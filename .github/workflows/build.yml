name: Build APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Buildozer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git python3-pip python3-dev \
            openjdk-17-jdk-headless autoconf libtool \
            libffi-dev libssl-dev zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo5 cmake libltdl-dev \
            libbz2-dev libreadline-dev libsqlite3-dev \
            unzip zip
          pip install buildozer Cython

      - name: Build APK
        working-directory: .
        run: buildozer android debug
        timeout-minutes: 60

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: trading-bot
          path: "*.apk"
